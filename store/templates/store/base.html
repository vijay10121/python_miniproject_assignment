{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}My Store{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

    <!-- Header -->
    <header>
        <h1>My Store</h1>
        <nav>
            <a href="{% url 'products' %}">Home</a>
            <a href="{% url 'cart' %}">Cart</a>
            <a href="{% url 'user' %}">User</a>
        </nav>
    </header>

    <!-- Main content -->
    <main>
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer>
        <p>Built with Django</p>
    </footer>

</body>
</html>
